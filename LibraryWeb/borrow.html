<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Borrowed Books</title>

    <link rel="stylesheet"
          href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            📚 LibraByte
        </div>

        <div class="nav-links">

            <a href="dashboard.html">
                Dashboard
            </a>

            <a href="books.html">
                Browse Books
            </a>

            <a href="borrow.html"
               class="active">
                My Borrowed
            </a>

        </div>

        <div class="user-area">

            <span id="userName"></span>

            <button onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <!-- MAIN -->

    <div class="dashboard">

        <!-- HERO SECTION -->

        <div class="hero-section">

            <div>

                <h1 class="page-title">
                    My Borrowed Books 📖
                </h1>

                <p class="hero-text">

                    Track your borrowed books,
                    due dates,
                    and return status easily.

                </p>

            </div>

        </div>

        <!-- NOTIFICATIONS -->

        <div id="notifications"></div>

        <!-- SEARCH + FILTER -->

        <div class="page-header">

            <div class="search-box">

                <input
                    id="searchHistory"
                    type="text"
                    placeholder="Search borrowed books..."
                    onkeyup="filterHistory()">

            </div>

            <select
                id="statusFilter"
                onchange="filterHistory()">

                <option value="">
                    All Status
                </option>

                <option value="Borrowed">
                    Borrowed
                </option>

                <option value="Late">
                    Late
                </option>

                <option value="Returned">
                    Returned
                </option>

            </select>

        </div>

        <!-- QUICK STATUS -->

        <div class="stats">

            <div class="stat-card">

                <h3>
                    Currently Borrowed
                </h3>

                <p id="borrowedCount">
                    0
                </p>

            </div>

            <div class="stat-card">

                <h3>
                    Returned Books
                </h3>

                <p id="returnedCount">
                    0
                </p>

            </div>

            <div class="stat-card">

                <h3>
                    Late Books
                </h3>

                <p id="lateCount">
                    0
                </p>

            </div>

        </div>

        <!-- TABLE -->

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th>
                            Book
                        </th>

                        <th>
                            Borrow Date
                        </th>

                        <th>
                            Due Date
                        </th>

                        <th>
                            Status
                        </th>

                        <th>
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody id="borrowTable"></tbody>

            </table>

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        © 2026 LibraByte Library System

    </div>

    <!-- USER -->

    <script>

        const currentUser =
        JSON.parse(localStorage.getItem("user"));

        if(!currentUser){

            location.href = "login.html";
        }

        document.getElementById("userName").innerText =
        "👋 " + currentUser.name;

        function logout(){

            localStorage.removeItem("user");

            location.href = "login.html";
        }

    </script>

    <!-- BORROW JS -->

    <script src="js/borrow.js"></script>

</body>

</html>
