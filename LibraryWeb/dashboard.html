<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Borrower Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family: Arial;
}
.sidebar{
    width:250px;
    height:100vh;
    background:#111827;
    position:fixed;
    padding:20px;
}
.sidebar h3{ text-align:center; margin-bottom:30px; }
.sidebar button{
    width:100%; margin-top:10px; padding:10px;
    border:none; border-radius:10px;
    background:#1f2937; color:white;
}
.sidebar button:hover{ background:#3b82f6; }

.main{ margin-left:260px; padding:20px; }

.card-box{
    background:#1f2937;
    padding:20px;
    border-radius:15px;
}

.overdue{ background:#7f1d1d !important; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>📚 Library</h3>
    <p id="userInfo"></p>

    <button onclick="showSection('books')">📖 Books</button>
    <button onclick="showSection('borrow')">🔄 My Borrowed</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- BOOKS -->
    <div id="books" class="section">
        <h2>📖 Available Books</h2>

        <input id="searchInput" class="form-control mt-2" placeholder="Search..." onkeyup="filterBooks()">

        <div class="card-box mt-3">
            <table class="table table-dark table-striped">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Category</th>
                        <th>Qty</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookTable"></tbody>
            </table>
        </div>
    </div>

    <!-- BORROWED -->
    <div id="borrow" class="section" style="display:none;">
        <h2>📦 My Borrowed Books</h2>

        <div class="card-box mt-3">
            <table class="table table-dark table-striped">
                <thead>
                    <tr>
                        <th>Book</th>
                        <th>Borrow Date</th>
                        <th>Due Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="borrowTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
const API_BOOKS = "https://localhost:7151/api/books";
const API_BORROW = "https://localhost:7151/api/borrow";
const API_RETURN = "https://localhost:7151/api/return";

let user = JSON.parse(localStorage.getItem("user"));
let allBooks = [];

document.getElementById("userInfo").innerText = user.name;

// NAV
function showSection(id){
    document.querySelectorAll(".section").forEach(s => s.style.display="none");
    document.getElementById(id).style.display="block";
}

// LOAD BOOKS
async function loadBooks(){
    const res = await fetch(API_BOOKS);
    const data = await res.json();
    allBooks = data;
    renderBooks(data);
}

// RENDER BOOKS
function renderBooks(books){
    let html = "";

    books.forEach(b => {
        html += `
        <tr>
            <td>${b.title}</td>
            <td>${b.author}</td>
            <td>${b.category}</td>
            <td>${b.quantity}</td>
            <td>
                <button class="btn btn-success btn-sm"
                    onclick="borrowBook(${b.bookId})"
                    ${b.quantity <= 0 ? "disabled" : ""}>
                    Borrow
                </button>
            </td>
        </tr>`;
    });

    bookTable.innerHTML = html;
}

// SEARCH
function filterBooks(){
    let s = searchInput.value.toLowerCase();

    let filtered = allBooks.filter(b =>
        b.title.toLowerCase().includes(s) ||
        b.author.toLowerCase().includes(s) ||
        b.category.toLowerCase().includes(s)
    );

    renderBooks(filtered);
}

// BORROW (MATCH SA API DTO)
async function borrowBook(bookId){

    let today = new Date();
    let due = new Date();
    due.setDate(today.getDate() + 7);

    const res = await fetch(API_BORROW, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            borrowId: 0,
            userId: user.userId,
            bookId: bookId,
            borrowDate: today.toISOString(),
            dueDate: due.toISOString(),
            status: "Borrowed"
        })
    });

    if(res.ok){
        alert("Book borrowed!");
        loadBooks();
        loadBorrow();
    } else {
        alert("Borrow failed");
    }
}

// LOAD BORROWED
async function loadBorrow(){
    const res = await fetch(`${API_BORROW}/user/${user.userId}`);
    const data = await res.json();

    console.log("BORROW DATA:", data); // debug

    let html = "";

    data.forEach(b => {

        let status = (b.status || "").toLowerCase();
        let overdue = new Date(b.dueDate) < new Date() && status !== "returned";

        html += `
        <tr class="${overdue ? 'overdue' : ''}">
            <td>${b.bookTitle || b.title || 'N/A'}</td>
            <td>${formatDate(b.borrowDate)}</td>
            <td>${formatDate(b.dueDate)}</td>
            <td>
                <span class="badge ${
                    status === "returned"
                    ? "bg-success"
                    : overdue
                    ? "bg-danger"
                    : "bg-warning text-dark"
                }">
                    ${overdue ? "Overdue" : b.status}
                </span>
            </td>
            <td>
                ${status !== "returned"
                    ? `<button class="btn btn-warning btn-sm"
                        onclick="returnBook(${b.borrowId})">
                        Return
                       </button>`
                    : `<span class="text-success">Returned</span>`
                }
            </td>
        </tr>`;
    });

    borrowTable.innerHTML = html;
}

// RETURN (MATCH SA API)
async function returnBook(borrowId){

    const res = await fetch(API_RETURN, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            returnBookId: 0,
            borrowId: borrowId,
            returnDate: new Date().toISOString(),
            fineAmount: 0
        })
    });

    if(res.ok){
        alert("Returned successfully!");
        loadBooks();
        loadBorrow();
    } else {
        alert("Return failed");
    }
}

// FORMAT DATE
function formatDate(date){
    return new Date(date).toLocaleDateString();
}

// LOGOUT
function logout(){
    localStorage.removeItem("user");
    location.href = "login.html";
}

// INIT
loadBooks();
loadBorrow();

</script>

</body>
</html>
