<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="navbar">
    <h2>📚 Library</h2>

    <div>
        <button onclick="loadPage('books.html')">Books</button>
        <button onclick="loadPage('borrow.html')">My Borrowed</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<iframe id="frame" src="books.html"></iframe>

<script>
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
    location.href="login.html";
}

function loadPage(p){
    document.getElementById("frame").src = p;
}

function logout(){
    localStorage.removeItem("user");
    location.href="login.html";
}
</script>

</body>
</html>
