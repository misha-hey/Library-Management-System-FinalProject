<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
    <h3>📚 Library</h3>
    <p id="userInfo"></p>

    <button onclick="loadPage('books.html')">📖 Books</button>
    <button onclick="loadPage('borrow.html')">📦 My Borrowed</button>
    <button onclick="logout()">Logout</button>
</div>

<div class="main">
    <iframe id="frame" src="books.html"></iframe>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
document.getElementById("userInfo").innerText = user.name;

function loadPage(p){
    frame.src = p;
}

function logout(){
    localStorage.removeItem("user");
    location.href="login.html";
}
</script>

</body>
</html>
