<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Library Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Prata&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body class="books-page">

    <div class="navbar">

        <div class="logo">
            📚 Library
        </div>

        <div class="user-area">

            <span id="userName"></span>

            <button onclick="location.href='books.html'">
                Books
            </button>

            <button onclick="location.href='borrow.html'">
                My Borrowed
            </button>

            <button onclick="logout()">
                Logout
            </button>

        </div>

    </div>

   <div class="dashboard">

    <!-- HERO / WELCOME -->

    <div class="welcome-card">

        <span class="welcome-badge">
            👋 Welcome Back
        </span>

        <h1>
            Hello, Jimmy 📚
        </h1>

        <p>

            Continue exploring your favorite books,
            manage your borrowed items,
            and enjoy your cozy reading experience.

        </p>

        <a href="books.html"
           class="hero-btn">

            Browse Collection

        </a>

    </div>

    <!-- RECENTLY BORROWED -->

    <div class="recent-card">
<div id="recentBorrowed">

</div>
        <div class="recent-header">

            <h2>
                Recently Borrowed
            </h2>

            <a href="#">
                View All
            </a>

        </div>      

    </div>

</div>

    <script>

        let user = JSON.parse(localStorage.getItem("user"));

        if(!user){

            location.href = "login.html";
        }

        document.getElementById("userName").innerText =
            "Hi, " + user.name;

        function logout(){

            localStorage.removeItem("user");

            location.href = "login.html";
        }

    </script>
    <script src="js/dashboard.js"></script>

</body>

</html>
