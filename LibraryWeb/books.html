<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Browse Books</title>

    <link rel="stylesheet"
          href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            📚 LibraByte
        </div>

        <div class="nav-links">

            <a href="dashboard.html">
                Dashboard
            </a>

            <a href="books.html"
               class="active">
                Browse Books
            </a>

            <a href="borrow.html">
                My Borrowed
            </a>

        </div>

        <div class="user-area">

            <span id="userName"></span>

            <button onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <!-- MAIN -->

    <div class="dashboard">

        <!-- HERO SECTION -->

        <div class="hero-section">

            <div>

                <h1 class="page-title">
                    Discover Your Next Book 📖
                </h1>

                <p class="hero-text">

                    Browse thousands of books,
                    discover new favorites,
                    and continue your reading journey.

                </p>

            </div>

        </div>

        <!-- SEARCH + FILTER -->

        <div class="page-header">

            <div class="search-box">

                <input id="searchInput"
                       type="text"
                       placeholder="Search books..."
                       onkeyup="applyFilters()">

            </div>

            <select id="categoryFilter"
                    onchange="applyFilters()">

                <option value="all">
                    All Categories
                </option>

                <option value="Programming">
                    Programming
                </option>

                <option value="Mathematics">
                    Mathematics
                </option>

                <option value="Science">
                    Science
                </option>

                <option value="History">
                    History
                </option>

                <option value="Literature">
                    Literature
                </option>

            </select>

        </div>

        <!-- CATEGORY CHIPS -->

        <div class="category-chips">

            <button onclick="filterCategory('all')">
                All
            </button>

            <button onclick="filterCategory('Programming')">
                Programming
            </button>

            <button onclick="filterCategory('Mathematics')">
                Math
            </button>

            <button onclick="filterCategory('Science')">
                Science
            </button>

            <button onclick="filterCategory('History')">
                History
            </button>

        </div>

        <!-- BOOK GRID -->

        <div id="bookGrid"
             class="grid">

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        © 2026 LibraByte Library System

    </div>

    <!-- SCRIPT -->

    <script>

        let user =
        JSON.parse(localStorage.getItem("user"));

        if(!user){

            location.href = "login.html";
        }

        document.getElementById("userName").innerText =
        "👋 " + user.name;

        function logout(){

            localStorage.removeItem("user");

            location.href = "login.html";
        }

        function filterCategory(category){

            document.getElementById("categoryFilter").value =
            category;

            applyFilters();
        }

    </script>

    <script src="js/book.js"></script>

</body>

</html>
