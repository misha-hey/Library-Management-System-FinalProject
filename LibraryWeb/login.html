<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library System - Borrower</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial;
        }

        .auth-card {
            width: 380px;
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn {
            width: 100%;
            border-radius: 10px;
        }

        .link {
            cursor: pointer;
            color: #0d6efd;
        }

        #dashboard {
            text-align: center;
            color: white;
        }

        .dashboard-box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
        }

        .input-group-text {
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginDiv" class="auth-card">
    <h3 class="title">📚 Borrower Login</h3>

    <input id="loginEmail" class="form-control mt-2" placeholder="Email">

    <div class="input-group mt-2">
        <input id="loginPassword" type="password" class="form-control" placeholder="Password">
        <span class="input-group-text" onclick="togglePassword('loginPassword', this)">
            <i class="bi bi-eye-slash"></i> <!-- default hidden -->
        </span>
    </div>

    <button onclick="login()" class="btn btn-primary mt-3">Login</button>

    <p class="text-center mt-3">
        No account?
        <a class="link" onclick="showRegister()">Register</a>
    </p>
</div>

<!-- REGISTER -->
<div id="registerDiv" class="auth-card" style="display:none;">
    <h3 class="title">📝 Register Borrower</h3>

    <input id="regName" class="form-control mt-2" placeholder="Full Name">
    <input id="regEmail" class="form-control mt-2" placeholder="Email">

    <div class="input-group mt-2">
        <input id="regPassword" type="password" class="form-control" placeholder="Password">
        <span class="input-group-text" onclick="togglePassword('regPassword', this)">
            <i class="bi bi-eye-slash"></i> <!-- default hidden -->
        </span>
    </div>

    <button onclick="register()" class="btn btn-success mt-3">Register</button>

    <p class="text-center mt-3">
        <a class="link" onclick="showLogin()">Back to Login</a>
    </p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
    <div class="dashboard-box">
        <h2 id="welcome"></h2>
        <p>📖 You can now browse and borrow books</p>

        <button onclick="logout()" class="btn btn-danger mt-3">Logout</button>
    </div>
</div>

<script>
const API_URL = "https://localhost:7151/api/auth";

// SWITCH
function showRegister(){
    loginDiv.style.display = "none";
    registerDiv.style.display = "block";
}

function showLogin(){
    registerDiv.style.display = "none";
    loginDiv.style.display = "block";
}

// ✅ FINAL TOGGLE (BASED SA IMONG RULE)
function togglePassword(inputId, el){
    const input = document.getElementById(inputId);
    const icon = el.querySelector("i");

    if(input.type === "password"){
        // SHOW PASSWORD
        input.type = "text";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye"); // 👁 visible
    } else {
        // HIDE PASSWORD
        input.type = "password";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash"); // 🙈 hidden
    }
}

// REGISTER
async function register(){
    const name = regName.value;
    const email = regEmail.value;
    const password = regPassword.value;

    const res = await fetch(`${API_URL}/register`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            name,
            email,
            password,
            role: "Borrower"
        })
    });

    alert(await res.text());
}

// LOGIN
async function login(){
    const email = loginEmail.value;
    const password = loginPassword.value;

    const res = await fetch(`${API_URL}/login`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ email, password })
    });

    if(!res.ok){
        alert("Invalid login");
        return;
    }

    const user = await res.json();

    if(user.role === "Admin"){
        alert("Admin must use the desktop system.");
        return;
    }

    loginDiv.style.display = "none";
    dashboard.style.display = "block";

    welcome.innerText = `Welcome ${user.name}`;
}

// LOGOUT
function logout(){
    location.reload();
}
</script>

</body>
</html>
