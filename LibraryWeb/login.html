<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-bg">

<div id="loginDiv" class="auth-card">
    <h3>📚 Library Login</h3>

    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p>No account? <span class="link" onclick="showRegister()">Register</span></p>
</div>

<div id="registerDiv" class="auth-card" style="display:none;">
    <h3>Register</h3>

    <input id="regName" placeholder="Name">
    <input id="regEmail" placeholder="Email">
    <input id="regPassword" type="password" placeholder="Password">

    <button onclick="register()">Register</button>

    <p><span class="link" onclick="showLogin()">Back</span></p>
</div>

<script src="js/auth.js"></script>
</body>
</html>
